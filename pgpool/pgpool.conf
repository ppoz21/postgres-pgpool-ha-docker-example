listen_addresses = '*'
port = 5432
socket_dir = '/var/run/pgpool'

pcp_listen_addresses = '*'
pcp_port = 9898
pcp_socket_dir = '/var/run/pgpool'

backend_clustering_mode = 'streaming_replication'

backend_hostname0 = 'postgres-primary'
backend_port0 = 5432
backend_weight0 = 1
backend_data_directory0 = '/var/lib/postgresql/data/pgdata'
backend_flag0 = 'ALLOW_TO_FAILOVER'
backend_application_name0 = 'postgres-primary'

backend_hostname1 = 'postgres-replica'
backend_port1 = 5432
backend_weight1 = 1
backend_data_directory1 = '/var/lib/postgresql/data/pgdata'
backend_flag1 = 'ALLOW_TO_FAILOVER'
backend_application_name1 = 'postgres-replica'

load_balance_mode = on
statement_level_load_balance = off
replicate_select = off

sr_check_period = 5
sr_check_user = 'pgpool_health'
sr_check_password = ''
delay_threshold = 10000000

health_check_period = 5
health_check_timeout = 3
health_check_user = 'pgpool_health'
health_check_password = ''
health_check_max_retries = 2
health_check_retry_delay = 1

failover_on_backend_error = off
search_primary_node_timeout = 10

enable_pool_hba = off
connection_cache = on
num_init_children = 32
max_pool = 4

log_destination = 'stderr'
logging_collector = off
logdir = '/var/log/pgpool'
log_connections = on
log_hostname = on
log_per_node_statement = on
log_statement = on
client_min_messages = notice

pid_file_name = '/var/run/pgpool/pgpool.pid'
